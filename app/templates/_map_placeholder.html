<div class="ph-map-panel"

     hx-trigger="load"
     hx-swap="outerHTML">
  <section>
    <div class="ph-map-visual-center h-full min-h-full bg-[#f1f1f2] text-sm text-[#4e5662]">
      <div class="flex items-center gap-3">

        <span>{{ t(lang, "loading_results") }}</span>

    </div>
