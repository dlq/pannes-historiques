<div class="order-1 space-y-6 lg:order-2">
  <section class="rounded-lg border border-[#c5cad2] bg-white p-4 shadow-sm sm:p-5">
    <h3 class="border-l-4 border-[#e0ad03] pl-3 text-lg font-semibold text-[#223654]">{{ t(lang, "map_panel") }}</h3>
    <div class="mt-4 grid gap-2 text-xs text-[#4e5662] sm:grid-cols-2">
      <div class="flex items-center gap-2">
        <span class="inline-block h-3 w-3 bg-[#f59e0b]"></span>
        <span>{{ t(lang, "current_outages") }}</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="inline-block h-3 w-3 bg-[#06b6d4]"></span>
        <span>{{ t(lang, "planned_panel") }}</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="inline-block h-3 w-3 border border-dashed border-[#64748b] bg-[#64748b]/20"></span>
        <span>{{ t(lang, "previous_outages_legend") }}</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="inline-block h-3 w-3 border border-dashed border-[#2563eb] bg-[#2563eb]/20"></span>
        <span>{{ t(lang, "disclosure") }}</span>
      </div>
      <div class="flex items-center gap-2 sm:col-span-2">
        <span class="inline-block h-3 w-3 bg-[#f6c27a]"></span>
        <span>{{ t(lang, "regional_colour_legend") }}</span>
      </div>
    </div>
    <outage-map class="mt-4 block h-[22rem] overflow-hidden rounded-md border border-[#c5cad2] sm:h-[28rem]" data-map='{{ map_payload | tojson }}'></outage-map>
    <dai-detail-panel class="mt-4 block" title-label="{{ t(lang, 'dai_detail_panel') }}" empty-label="{{ t(lang, 'dai_detail_empty') }}"></dai-detail-panel>
    <p class="mt-3 text-sm text-[#6b778a]">{{ t(lang, "map_empty") if not map_payload.matches else "" }}</p>
  </section>
</div>
