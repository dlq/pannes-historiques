<div class="ph-map-panel">
  <section>
    <outage-map class="ph-outage-map" data-map='{{ map_payload | tojson }}'></outage-map>
    {% if map_payload.showEmptyNotice is not defined or map_payload.showEmptyNotice %}
      {% if not map_payload.matches %}
        <p class="absolute bottom-4 left-4 z-20 rounded-md bg-white/95 px-3 py-2 text-sm text-[#6b778a] shadow">
          {{ t(lang, "map_empty") }}
        </p>
      {% endif %}
    {% endif %}
  </section>
</div>
