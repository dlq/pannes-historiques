{% if result.error %}
  <div class="rounded-lg border border-[#cb381f] bg-[#ffdbd6] p-6 text-[#692519]">{{ error_message }}</div>
{% else %}
  <div id="map-surface-content" class="ph-map-stage" hx-swap-oob="innerHTML">
    {% if map_payload %}
      {% include "_map_panel.html" %}
    {% endif %}
  </div>
  {% with context_map_payload=map_payload, context_variant="search" %}
    {% include "_default_context_list.html" %}
  {% endwith %}
{% endif %}
