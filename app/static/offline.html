<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>pannes.ca hors ligne</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial,
          sans-serif;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        margin: 0;
        padding: 24px;
        background: #f7f7f8;
        color: #1b1b1f;
      }

      main {
        max-width: 400px;
        padding: 22px 20px;
        background: #fff;
        border: 1px solid #e6e6ea;
        border-radius: 16px;
        text-align: center;
      }

      .brand {
        display: inline-block;
        padding: 6px 12px;
        background: #efeff0;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
      }

      h1 {
        margin: 14px 0 0;
        font-size: 1.2rem;
        font-weight: 600;
        line-height: 1.3;
      }

      p {
        margin: 8px 0 0;
        color: #55555c;
        font-size: 0.9rem;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="brand">pannes.ca</span>
      <h1>Hors ligne pour le moment</h1>
      <p>
        Cette page n'est pas disponible sans connexion. Reconnectez-vous pour consulter les pannes

      </p>
