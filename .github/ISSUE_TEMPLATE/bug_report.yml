name: Bug report
description: Report a reproducible problem in the site or repository.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Please do not include private addresses, browser-location coordinates, credentials, or operation tokens."
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behaviour and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Search for ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Production or local; browser and version; desktop or mobile"
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or logs
      description: Remove sensitive data before attaching anything.
